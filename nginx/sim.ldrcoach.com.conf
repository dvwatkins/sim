server {
    listen 80;
    server_name sim.ldrcoach.com;

    # Redirect HTTP to HTTPS (after certbot setup)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sim.ldrcoach.com;

    # SSL certs (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/sim.ldrcoach.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sim.ldrcoach.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Longer timeout for AI responses
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
